<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.10);
    }

    /* Header */
    .card-header {
      background: #fff;
      padding: 2.25rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo-box {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 1rem;
      overflow: hidden;
      border: 3px solid #111;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-name {
      font-size: 23px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .card-role {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .card-company {
      font-size: 13px;
      font-weight: 700;
      color: #111;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Rows */
    .rows { padding: 0.4rem 1.25rem; }
    .row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      font-weight: 500;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .row:active { opacity: .65; }

    .dot {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 50%;
      background: #FFD966;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dot svg { width: 21px; height: 21px; fill: #111; }

    .row-text { display: flex; flex-direction: column; gap: 2px; }
    .row-sub { font-size: 12px; color: #aaa; font-weight: 400; }

    /* Save button */
    .save-btn {
      display: block;
      margin: 0.75rem 1.25rem 1.25rem;
      padding: 15px;
      background: #FFD966;
      border-radius: 50px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { opacity: .8; }

    /* QR */
    .qr-section {
      border-top: 1px solid #f0f0f0;
      padding: 1.25rem 1.5rem 1.75rem;
      text-align: center;
    }
    .qr-label {
      font-size: 10px;
      font-weight: 600;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 12px;
    }
    #qr-canvas { border-radius: 8px; display: block; margin: 0 auto; }
    .qr-url { font-size: 11px; color: #ccc; margin-top: 8px; }
  </style>
</head>

<script>
  const pageUrl = window.location.href || 'https://assaadazar.github.io/aah';
  QRCode.toCanvas(document.getElementById('qr-canvas'), pageUrl, {
    width: 96, margin: 1,
    color: { dark: '#111111', light: '#ffffff' }
  });
  const display = (window.location.hostname + window.location.pathname).replace(/\/$/, '');
  if (display.length > 3) document.getElementById('qr-url-label').textContent = display;
